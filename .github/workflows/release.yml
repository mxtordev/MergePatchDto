name: Release

on:
  workflow_dispatch:
    inputs:
      nuget_username:
        description: NuGet.org username or organization profile name, not an email address.
        required: true
        type: string
      confirm_publish:
        description: Type publish to confirm publishing to nuget.org.
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish NuGet package
    runs-on: ubuntu-latest
    environment:
      name: release
      deployment: false

    steps:
      - name: Ensure main branch
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            printf 'Release workflow must be run from main, got %s\n' "$GITHUB_REF" >&2
            exit 1
          fi

      - name: Confirm publish
        shell: bash
        env:
          CONFIRM_PUBLISH: ${{ inputs.confirm_publish }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM_PUBLISH" != "publish" ]; then
            printf 'Set confirm_publish to publish to continue.\n' >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore MergePatchDto.slnx

      - name: Build
        run: dotnet build MergePatchDto.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MergePatchDto.slnx --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/MergePatchDto/MergePatchDto.csproj --configuration Release --no-restore --output artifacts/packages

      - name: Package smoke test
        id: package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(artifacts/packages/MergePatchDto.*.nupkg)
          if [ "${#packages[@]}" -ne 1 ]; then
            printf 'Expected exactly one MergePatchDto package, found %s\n' "${#packages[@]}" >&2
            exit 1
          fi

          package_file="${packages[0]}"
          package_version="$(basename "$package_file")"
          package_version="${package_version#MergePatchDto.}"
          package_version="${package_version%.nupkg}"

          tests/PackageSmoke/run.sh artifacts/packages "$package_version" net10.0
          tests/PackageSmoke/run.sh artifacts/packages "$package_version" net8.0 8.0.100

          printf 'package_file=%s\n' "$package_file" >> "$GITHUB_OUTPUT"
          printf 'package_version=%s\n' "$package_version" >> "$GITHUB_OUTPUT"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mergepatchdto-release-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ inputs.nuget_username }}

      - name: Publish package
        run: >
          dotnet nuget push "${{ steps.package.outputs.package_file }}"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ steps.package.outputs.package_version }}
        run: |
          set -euo pipefail

          tag="v${PACKAGE_VERSION}"
          notes_file="$RUNNER_TEMP/release-notes.md"

          awk -v version="$PACKAGE_VERSION" '
            $0 == "## " version || index($0, "## " version " ") == 1 {
              in_section = 1
              next
            }

            in_section && /^## / {
              exit
            }

            in_section {
              print
            }
          ' CHANGELOG.md > "$notes_file"

          if ! grep -q '[^[:space:]]' "$notes_file"; then
            printf 'Could not find changelog notes for version %s.\n' "$PACKAGE_VERSION" >&2
            exit 1
          fi

          git fetch --tags --force origin

          if gh release view "$tag" >/dev/null 2>&1; then
            printf 'GitHub release %s already exists.\n' "$tag"
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            tagged_commit="$(git rev-list -n 1 "$tag")"
            if [ "$tagged_commit" != "$GITHUB_SHA" ]; then
              printf 'Tag %s already points to %s, expected %s.\n' "$tag" "$tagged_commit" "$GITHUB_SHA" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag" "$GITHUB_SHA"
            git push origin "refs/tags/$tag"
          fi

          gh release create "$tag" --title "$tag" --notes-file "$notes_file" --verify-tag
